
name: Url Management API CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'UrlManagement.Api/**'
      - 'Shared/**'
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore UrlManagement.Api/UrlManagement.Api.csproj

      - name: Build project
        run: dotnet build UrlManagement.Api/UrlManagement.Api.csproj --configuration Release --no-restore

      - name: Run xUnit Tests
        run: dotnet test UrlManagement.Api.Tests/UrlManagement.Api.Tests.csproj --configuration Release --no-build

  docker-and-deploy:
    needs: test-and-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: UrlManagement.Api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/urlmanagement-api:latest

      - name: Trigger Deployment on Render
        run: curl -X GET ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
